services:
  - type: web
    name: ai-talent-sense-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/backend
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY_PARSE
        sync: false
      - key: GROQ_API_KEY_SCORE
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: CRUSTDATA_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
